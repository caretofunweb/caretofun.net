<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager — AstroBlog</title>
    <style>
      /* Force the Decap CMS editor pane into a flex grid */
      div[class*="ControlPaneContainer"] > div {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
      }
      
      /* Make all field wrappers 48% width to sit side-by-side */
      div[class*="ControlPaneContainer"] > div > div {
        flex: 1 1 calc(50% - 15px);
        min-width: 250px;
      }
      
      /* Force core fields to take 100% width (Full Row) */
      div[class*="ControlPaneContainer"] > div > div:has(label[for*="body"]),
      div[class*="ControlPaneContainer"] > div > div:has(label[for*="title"]),
      div[class*="ControlPaneContainer"] > div > div:has(label[for*="description"]),
      div[class*="ControlPaneContainer"] > div > div:has(label[for*="excerpt"]),
      div[class*="ControlPaneContainer"] > div > div:has(label[for*="image"]) {
        flex: 1 1 100%;
      }
    </style>
  </head>
  <body>
    <!--
      Decap CMS Entry Point
      Loaded from CDN for simplicity. The CMS runs entirely in the browser
      and communicates with GitHub via the OAuth proxy defined in functions/.
      Configuration is in config.yml (same directory).
    -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <script>
      CMS.registerEditorComponent({
        id: "pagebreak",
        label: "✂️ Page Break",
        fields: [],
        pattern: /^<!--nextpage-->$/,
        fromBlock: function(match) {
          return {
            match: match[0]
          };
        },
        toBlock: function(obj) {
          return '<!--nextpage-->';
        },
        toPreview: function(obj) {
          return '<hr style="border: 2px dashed #ccc; margin: 20px 0;" />';
        }
      });
    </script>
  </body>
</html>
